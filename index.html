<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Update</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2c7be5;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Password Update</h2>
  <p>Please enter your credentials to continue</p>

  <input type="text" placeholder="Email">
  <input type="password" placeholder="Password">

  <button onclick="showMessage()">Update Password</button>
</div>

<script>
function showMessage() {
  alert("This was a cybersecurity training exercise. No data has been collected.");
}
</script>

</body>
</html>
